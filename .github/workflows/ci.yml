name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Node ${{ matrix.node-version }} on macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Package dry run
        run: npm run pack:dry-run
